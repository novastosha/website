<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="author" content="S. S.">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Local Cyberpunk Sudoku">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=IBM+Plex+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.sajed.dev/web/assets/styles.css">
    <link rel="stylesheet" href="https://cdn.sajed.dev/web/assets/sudoku-styles.css">
    <style>
        /* --- NUMPAD BADGES --- */
        .num-btn {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            line-height: 1;
            transition: transform 0.1s, background-color 0.2s;
        }

        .num-btn:active {
            transform: scale(0.95);
        }

        .num-btn.completed {
            opacity: 0.3;
            background: #000;
            border-color: #333;
        }

        .num-count {
            font-size: 0.6rem;
            margin-top: 2px;
            color: #888;
            font-family: var(--font-mono);
        }

        .num-btn.completed .num-count {
            display: none;
        }

        /* --- MOBILE LAYOUT TRANSFORMATION --- */
        @media (max-width: 768px) {

            /* Hide the main header to save space on small screens */
            .site-header {
                display: none;
            }

            .site-footer {
                display: none;
            }

            #intro {
                display: none;
            }

            body {
                padding-top: 10px;
                padding-bottom: 200px;
            }

            /* Space for fixed bottom */

            /* Sticky Controls Container */
            .mobile-controls-wrapper {
                position: fixed;
                bottom: 0;
                left: 0;
                width: 100%;
                background: rgba(5, 5, 16, 0.95);
                backdrop-filter: blur(10px);
                border-top: 1px solid var(--accent-green);
                padding: 10px 10px 20px 10px;
                /* Extra padding for iPhone home bar */
                z-index: 1000;
                box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.5);
                display: flex;
                flex-direction: column;
                gap: 10px;
            }

            /* Adjust Action Bar for Mobile */
            .action-bar {
                order: 1;
                /* Above numpad */
                justify-content: space-between;
                margin-top: 0;
            }

            .action-bar .retro-btn {
                flex: 1;
                font-size: 0.8rem;
                padding: 8px;
            }

            /* Adjust Numpad for Mobile */
            .numpad {
                order: 2;
                grid-template-columns: repeat(9, 1fr);
                /* All in one row */
                gap: 4px;
            }

            .num-btn {
                aspect-ratio: 0.8;
                /* Taller */
                font-size: 1.2rem;
            }

            /* Erase button styling in the row */
            .num-btn:last-child {
                color: var(--error-color);
                border-color: var(--error-color);
            }

            /* Re-arrange Game Wrapper */
            .game-wrapper {
                max-width: 100%;
            }

            /* Compact HUD */
            .hud-panel {
                grid-template-columns: repeat(4, 1fr);
                gap: 5px;
                padding: 5px;
                font-size: 0.8rem;
            }

            .hud-value {
                font-size: 0.9rem;
            }

            /* Settings Bar: Compact or Hide */
            .settings-bar {
                justify-content: space-between;
            }

            .settings-bar select,
            .settings-bar button {
                font-size: 0.8rem;
                padding: 5px;
            }
        }

        /* Delete Button in Load Modal */
        .btn-delete {
            background: transparent;
            border: none;
            color: #666;
            cursor: pointer;
            padding: 5px;
            font-family: var(--font-pixel);
        }

        .btn-delete:hover {
            color: var(--error-color);
        }

        .save-item-content {
            flex-grow: 1;
        }
    </style>
    <title>sajed.dev - Sudoku</title>

</head>

<body>

    <header class="site-header">
        <a href="#top" class="logo">sajed.dev</a>
        <nav class="main-nav">
            <ul>
                <li><a href="#intro">Intro</a></li>
                <li><a href="#game">Play</a></li>
                <li><a href="https://sajed.dev">Go to main page</a></li>
            </ul>
        </nav>
        <button class="menu-toggle" aria-label="Open navigation menu">
            <span></span><span></span><span></span>
        </button>
    </header>

    <nav class="mobile-nav">
        <ul>
            <li><a href="#intro">Intro</a></li>
            <li><a href="#game">Play</a></li>
            <li><a href="https://sajed.dev">Go to main page</a></li>
        </ul>
    </nav>

    <main>

        <section id="game" class="container" style="padding-top: 20px;">
            <div class="game-wrapper">

                <div class="settings-bar">
                    <select id="difficulty" class="retro-select" onchange="game.ui.updateDifficultyColor()">
                        <option value="easy">Easy</option>
                        <option value="medium" selected>Medium</option>
                        <option value="hard">Hard</option>
                    </select>
                    <select id="mistake-mode" class="retro-select">
                        <option value="infinite">∞ Mistakes</option>
                        <option value="3">3 Mistakes</option>
                        <option value="1">Sudden Death</option>
                    </select>
                    <button class="retro-btn" onclick="game.newGame()">Start</button>
                    <button class="retro-btn" onclick="game.ui.toggleLoadModal()">Load Game</button>
                </div>

                <div class="hud-panel">
                    <div class="hud-item">
                        <span class="hud-label">Difficulty</span>
                        <span id="stat-diff" class="hud-value diff-medium">MED</span>
                    </div>
                    <div class="hud-item">
                        <span class="hud-label">Score</span>
                        <span id="stat-score" class="hud-value">0</span>
                    </div>
                    <div class="hud-item">
                        <span class="hud-label">Mistakes</span>
                        <span id="stat-mistakes" class="hud-value">0/∞</span>
                    </div>
                    <div class="hud-item">
                        <span class="hud-label">Time</span>
                        <span id="stat-time" class="hud-value">00:00</span>
                    </div>
                </div>

                <div id="sudoku-board" class="sudoku-board"></div>

                <div class="action-bar">
                    <button class="retro-btn" onclick="game.undo()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M9 14L4 9l5-5" />
                            <path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5v0a5.5 5.5 0 0 1-5.5 5.5H11" />
                        </svg>
                        Undo
                    </button>
                    <button class="retro-btn" id="btn-pen" onclick="game.togglePenMode()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M12 19l7-7 3 3-7 7-3-3z" />
                            <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z" />
                            <circle cx="11" cy="11" r="2" />
                        </svg>
                        Pen Mode
                    </button>
                    <button class="retro-btn magenta-border" onclick="game.getHint()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M9 21h6v-5.5a4.5 4.5 0 1 0-9 0V21zm3-9a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5z" />
                        </svg>
                        Hint
                        <span class="cost-badge">-100</span>
                    </button>
                </div>

                <div class="numpad" id="numpad"></div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <p class="center" style="max-width: fit-content; margin: 0 auto;">sajed.dev © 2026 <a
                href="https://git.sajed.dev/website">git.sajed.dev/website</a></p>
    </footer>

    <div id="load-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 class="modal-title">Saved Sessions</h2>
            <ul id="saved-games-list" class="save-list"></ul>
            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <button class="retro-btn" style="flex: 1;" onclick="game.ui.toggleLoadModal()">Close</button>
                <button class="retro-btn error-color" style="flex: 1;"
                    onclick="game.clearAllSaves()">Clear All Saves</button>
            </div>
        </div>
    </div>

    <div id="msg-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 id="msg-title" class="modal-title">Report</h2>
            <p id="msg-body" style="margin-bottom: 20px; font-family: var(--font-mono);"></p>
            <button class="retro-btn" style="width:100%"
                onclick="document.getElementById('msg-modal').style.display='none'; game.newGame()">Start a new
                game</button>
        </div>
    </div>


    <script src="https://sajed.dev/assets/common.js"></script>
    <script src="https://cdn.sajed.dev/web/assets/sudoku-engine.js"></script>
</body>

</html>
